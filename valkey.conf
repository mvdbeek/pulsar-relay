# Pulsar Relay - Valkey Configuration
# Optimized for message persistence and performance

# Network
# Bind to loopback only: the relay process runs in the same container under
# supervisord, so Valkey is never reachable from outside the container.
bind 127.0.0.1
port 6379
timeout 300
tcp-keepalive 60

# Security
# ``protected-mode yes`` plus ``requirepass`` (supplied on the command line
# via ``--requirepass %(ENV_PULSAR_VALKEY_PASSWORD)s`` in the supervisord
# entry) refuses unauthenticated traffic even on the loopback interface.
protected-mode yes
# Do NOT set requirepass in this file. The password is templated in via the
# supervisord ``command=`` directive so it can come from the container env.

# Persistence - AOF (Append Only File)
# This provides durability with minimal performance impact
appendonly yes
appendfilename "appendonly.aof"

# AOF fsync policy
# - always: fsync on every write (slow, zero data loss)
# - everysec: fsync every second (fast, <1s data loss on crash)
# - no: never fsync, let OS handle it (fastest, most data loss risk)
appendfsync everysec

# Rewrite AOF file when it grows too large
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# Enable mixed RDB-AOF format for faster restarts
aof-use-rdb-preamble yes

# Persistence - RDB (Snapshot)
# Create snapshots for fast recovery
# Save if 1 key changed in 15 minutes
# Save if 10 keys changed in 5 minutes
# Save if 10000 keys changed in 1 minute
save 900 1
save 300 10
save 60 10000

stop-writes-on-bgsave-error yes
rdbcompression yes
rdbchecksum yes
dbfilename dump.rdb
dir /data

# Memory Management
# Set based on available system memory (e.g., 8GB for a 16GB system)
maxmemory 8gb

# Eviction policy when maxmemory is reached
# - allkeys-lru: Evict least recently used keys from all keys
# - volatile-lru: Evict LRU from keys with expire set
# - allkeys-lfu: Evict least frequently used keys
# - noeviction: Return errors when memory limit is reached
maxmemory-policy allkeys-lru

# Samples to check for LRU/LFU eviction (higher = more accurate but slower)
maxmemory-samples 5

# Lazy freeing (delete in background to avoid blocking)
lazyfree-lazy-eviction yes
lazyfree-lazy-expire yes
lazyfree-lazy-server-del yes
replica-lazy-flush yes

# Streams Configuration
# Note: Stream trimming is handled by the application, not Valkey

# Client Output Buffer Limits
# Prevents slow clients from causing memory issues
client-output-buffer-limit normal 0 0 0
client-output-buffer-limit replica 256mb 64mb 60
client-output-buffer-limit pubsub 32mb 8mb 60

# Performance Tuning
# I/O threads for handling network I/O (set to number of CPU cores - 1)
io-threads 4
io-threads-do-reads yes

# Disable RDB when AOF is enabled (optional, saves disk I/O)
# save ""

# Logging
loglevel notice
logfile ""

# Slow log - log queries slower than this (microseconds)
slowlog-log-slower-than 10000
slowlog-max-len 128

# Enable for clustering (not required for single instance)
# cluster-enabled no

# Additional Security: rename destructive / introspection commands to the
# empty string so they cannot be invoked over the wire. The relay never
# calls FLUSH*/CONFIG/DEBUG/SHUTDOWN/KEYS in production code paths; tests
# use SCAN + DEL via tests/_storage_helpers.py.
rename-command FLUSHDB ""
rename-command FLUSHALL ""
rename-command CONFIG ""
rename-command DEBUG ""
rename-command SHUTDOWN ""
rename-command KEYS ""
