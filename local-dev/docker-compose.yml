name: pulsar-relay-local

# WARNING: every secret below is a known, public string. This compose file is
# for local development only. NEVER use these values — or this file — in any
# environment that is reachable from outside your laptop. The relay's startup
# guard refuses to boot with default secrets unless
# PULSAR_ALLOW_INSECURE_DEFAULTS=1 is set, which is exactly what this file
# does so contributors can run the stack with one command.

services:
  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    command:
      - start-dev
      - --http-port=8080
      - --import-realm
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: adminpassword
      # Frontchannel URLs (auth_endpoint, issuer in tokens) point at the
      # browser-accessible address. Backchannel calls (token, jwks, userinfo)
      # use whatever Host header arrives — so the relay container can reach
      # Keycloak via the docker network alias `keycloak:8080`.
      KC_HOSTNAME: http://localhost:8080
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_HTTPS: "false"
      KC_HOSTNAME_BACKCHANNEL_DYNAMIC: "true"
      KC_HTTP_ENABLED: "true"
      # Expose Keycloak's built-in health probe on the management port (9000).
      KC_HEALTH_ENABLED: "true"
    ports:
      - "8080:8080"
    volumes:
      - ./keycloak:/opt/keycloak/data/import:ro
    healthcheck:
      # KC 26 ships a Java client at /opt/keycloak/bin/kc.sh and a curl-free
      # /health/ready probe on the management port (9000 by default).
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/9000 && printf 'GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && head -1 <&3 | grep -q ' 200 '"]
      interval: 5s
      timeout: 3s
      retries: 40
      start_period: 30s

  valkey:
    image: valkey/valkey:8.0
    command: ["valkey-server", "--requirepass", "local-dev-valkey-password"]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "valkey-cli", "-a", "local-dev-valkey-password", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  relay:
    build:
      context: ..
      dockerfile: local-dev/Dockerfile
    ports:
      - "9000:9000"
    environment:
      # Tells the startup guard that the dev defaults below are acceptable.
      # Never set this flag outside local-dev / tests.
      PULSAR_ALLOW_INSECURE_DEFAULTS: "1"
      # Don't ever ship this default to production — it's a known string.
      PULSAR_JWT_SECRET_KEY: local-dev-jwt-secret-do-not-use-in-prod-min-32-bytes-long
      # Bootstrap a local admin so /auth/login works in addition to OIDC.
      PULSAR_BOOTSTRAP_ADMIN_USERNAME: admin
      PULSAR_BOOTSTRAP_ADMIN_PASSWORD: adminpw1234
      PULSAR_BOOTSTRAP_ADMIN_EMAIL: admin@example.com
      # Persistent backend.
      PULSAR_STORAGE_BACKEND: valkey
      PULSAR_VALKEY_HOST: valkey
      PULSAR_VALKEY_PORT: "6379"
      PULSAR_VALKEY_PASSWORD: local-dev-valkey-password
      # OIDC.
      PULSAR_OIDC__ENABLED: "true"
      PULSAR_OIDC__BASE_URL: http://localhost:9000
      PULSAR_OIDC__PROVIDERS__KEYCLOAK__DISPLAY_NAME: Sign in with Keycloak
      PULSAR_OIDC__PROVIDERS__KEYCLOAK__DISCOVERY_URL: http://keycloak:8080/realms/pulsar-local/.well-known/openid-configuration
      PULSAR_OIDC__PROVIDERS__KEYCLOAK__CLIENT_ID: pulsar-relay
      PULSAR_OIDC__PROVIDERS__KEYCLOAK__CLIENT_SECRET: pulsar-local-secret
      PULSAR_OIDC__PROVIDERS__KEYCLOAK__CLAIM_USERNAME: preferred_username
      PULSAR_LOG_LEVEL: INFO
    depends_on:
      keycloak:
        condition: service_healthy
      valkey:
        condition: service_healthy
    volumes:
      # Live-reload: edits on the host trigger uvicorn reload.
      - ../pulsar_relay:/app/pulsar_relay:ro
