[tox]
envlist = py39, py310, py311, py312, lint, mypy, pytest
isolated_build = True

[testenv]
description = Run tests with pytest
extras = dev
setenv =
    PYTHONPATH = {toxinidir}
commands =
    pytest {posargs}

[testenv:pytest]
description = Run pytest with Valkey integration tests
extras = dev
setenv =
    PYTHONPATH = {toxinidir}
    VALKEY_INTEGRATION_TEST = 1
commands =
    pytest {posargs}

[testenv:client-tests]
description = Run the pulsar-relay-client unit suite
skip_install = True
deps =
    -e {toxinidir}/client[dev]
changedir = {toxinidir}/client
commands =
    pytest tests/ {posargs}

[testenv:e2e]
description = Run OIDC end-to-end tests (requires Docker)
extras = dev
deps =
    # The sibling client distribution is a separate project; install it so
    # tests can exercise the published wire-contract primitives.
    -e {toxinidir}/client[dev]
setenv =
    PYTHONPATH = {toxinidir}
commands =
    pytest -m e2e --no-cov tests/e2e {posargs}

[testenv:lint]
description = Run code formatters / linters (ruff + black)
extras = dev
skip_install = False
commands =
    # ruff uses pyproject.toml configuration
    ruff check .
    # black will use pyproject.toml configuration
    black --check .

[testenv:mypy]
description = Run static type checks (mypy)
extras = dev
deps =
    # The sibling client distribution is a separate project; install it so
    # its source is importable and type-checkable from the same env.
    -e {toxinidir}/client[dev]
    types-requests
commands =
    # Run mypy over the server package, its tests, and the client distribution
    mypy pulsar_relay tests client/pulsar_relay_client client/tests
