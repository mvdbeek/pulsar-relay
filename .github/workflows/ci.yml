name: CI - tox

on: [push, pull_request]

jobs:
  check:
    name: lint & mypy (once)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-3.11-${{ hashFiles('**/requirements.txt','**/pyproject.toml','**/tox.ini') }}
          restore-keys: |
            ${{ runner.os }}-pip-3.11-
            ${{ runner.os }}-pip-

      - name: Show Python
        run: |
          python --version
          which python

      - name: Install tox
        run: pip install --upgrade pip && pip install tox

      - name: Run lint + mypy
        run: tox -e lint,mypy -vv

  tests:
    name: pytest matrix
    needs: check
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [ '3.10', '3.11', '3.12', '3.13', '3.14' ]

    # Note: we deliberately do NOT use the GitHub Actions ``services:``
    # syntax for Valkey because it can't override the container CMD to
    # pass ``--requirepass``. Running Valkey via a manual ``docker run``
    # step (below) lets CI exercise the AUTH-required path that
    # production uses — without it, a regression like the
    # PubSubCoordinator credentials leak (fixed in 60d739c) sails
    # through CI and only shows up when a real operator boots the
    # local-dev compose.

    env:
      # Enable the integration tests that check for a running Valkey instance
      VALKEY_INTEGRATION_TEST: '1'
      # Match what the docker run step below sets via --requirepass.
      # Fixed value; this is an ephemeral runner so there's no point
      # generating per-run randomness.
      PULSAR_VALKEY_PASSWORD: 'ci-valkey-password'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start authenticated Valkey
        # Use the same image / version pin as the GHA service syntax
        # would have, but drive it via docker run so we can pass
        # ``--requirepass``. The healthcheck uses the same password so
        # the wait loop below knows when the daemon is actually
        # accepting authenticated traffic.
        run: |
          docker run -d \
            --name valkey \
            -p 6379:6379 \
            --health-cmd "redis-cli -a $PULSAR_VALKEY_PASSWORD ping | grep PONG" \
            --health-interval 5s \
            --health-timeout 5s \
            --health-retries 60 \
            valkey/valkey:latest \
            valkey-server --requirepass "$PULSAR_VALKEY_PASSWORD"
          # Wait for the healthcheck to report healthy (max ~5 min).
          for _ in $(seq 1 60); do
            status=$(docker inspect --format '{{.State.Health.Status}}' valkey 2>/dev/null || echo "starting")
            if [ "$status" = "healthy" ]; then
              echo "Valkey is healthy (authenticated)"
              exit 0
            fi
            sleep 5
          done
          echo "Valkey never became healthy"
          docker logs valkey
          exit 1

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('**/requirements.txt','**/pyproject.toml','**/tox.ini') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-
            ${{ runner.os }}-pip-

      - name: Cache tox envs
        uses: actions/cache@v4
        with:
          path: .tox
          key: ${{ runner.os }}-tox-${{ matrix.python-version }}-${{ hashFiles('**/tox.ini','**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-tox-${{ matrix.python-version }}-
            ${{ runner.os }}-tox-

      - name: Show Python
        run: |
          python --version
          which python

      - name: Install tox
        run: pip install --upgrade pip && pip install tox

      - name: Run pytest
        # Run pytest env only
        run: tox -e pytest

      - name: Dump Valkey logs on failure
        if: failure()
        run: docker logs valkey || true

  client-tests:
    name: pulsar-relay-client unit tests
    needs: check
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # The client claims to support the full python range; verify it.
        python-version: [ '3.10', '3.11', '3.12', '3.13', '3.14' ]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-client-${{ matrix.python-version }}-${{ hashFiles('client/pyproject.toml','tox.ini') }}
          restore-keys: |
            ${{ runner.os }}-pip-client-${{ matrix.python-version }}-
            ${{ runner.os }}-pip-

      - name: Install tox
        run: pip install --upgrade pip && pip install tox

      - name: Run client unit suite
        run: tox -e client-tests

  e2e:
    name: OIDC end-to-end (Keycloak)
    needs: check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-3.12-${{ hashFiles('**/requirements.txt','**/pyproject.toml','**/tox.ini') }}
          restore-keys: |
            ${{ runner.os }}-pip-3.12-
            ${{ runner.os }}-pip-

      - name: Cache tox envs
        uses: actions/cache@v4
        with:
          path: .tox
          key: ${{ runner.os }}-tox-3.12-e2e-${{ hashFiles('**/tox.ini','**/requirements.txt','**/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-tox-3.12-e2e-
            ${{ runner.os }}-tox-3.12-

      - name: Docker pre-flight
        run: |
          docker version
          docker compose version
          docker info

      - name: Pre-pull Keycloak image
        run: docker pull quay.io/keycloak/keycloak:26.0

      - name: Install tox
        run: pip install --upgrade pip && pip install tox

      - name: Run OIDC e2e tests
        run: tox -e e2e

      - name: Dump Keycloak logs on failure
        if: failure()
        run: |
          docker compose -f tests/e2e/docker-compose.yml logs || true
          docker ps -a || true
