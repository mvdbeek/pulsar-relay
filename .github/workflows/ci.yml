name: CI - tox

on: [push, pull_request]

jobs:
  check:
    name: lint & mypy (once)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-3.11-${{ hashFiles('**/requirements.txt','**/pyproject.toml','**/tox.ini') }}
          restore-keys: |
            ${{ runner.os }}-pip-3.11-
            ${{ runner.os }}-pip-

      - name: Show Python
        run: |
          python --version
          which python

      - name: Install tox
        run: pip install --upgrade pip && pip install tox

      - name: Run lint + mypy
        run: tox -e lint,mypy -vv

  tests:
    name: pytest matrix
    needs: check
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [ '3.10', '3.11', '3.12', '3.13', '3.14' ]

    # Make Valkey available as a service container. The service's port 6379
    # is published to the runner so tests can connect to localhost:6379.
    services:
      valkey:
        image: valkey/valkey:latest
        ports:
          - 6379:6379
        # Use docker run options to set a sysctl required by Valkey/Redis
        # and use a Redis-aware healthcheck (redis-cli ping) for faster, more
        # accurate readiness detection on the runner.
        options: >-
          --health-cmd "redis-cli -h localhost -p 6379 ping || exit 1"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 60

    env:
      # Enable the integration tests that check for a running Valkey instance
      VALKEY_INTEGRATION_TEST: '1'
      # The GitHub Actions ``services:`` container syntax does not let us
      # override the Valkey CMD to pass ``--requirepass``, so the runner
      # Valkey accepts unauthenticated connections. The startup guard would
      # otherwise refuse to boot when PULSAR_STORAGE_BACKEND=valkey without
      # a password. The escape hatch is acceptable on an ephemeral runner;
      # the guard's real-secret failure modes are unit-tested in
      # tests/test_startup_guard.py.
      PULSAR_ALLOW_INSECURE_DEFAULTS: '1'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('**/requirements.txt','**/pyproject.toml','**/tox.ini') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-
            ${{ runner.os }}-pip-

      - name: Cache tox envs
        uses: actions/cache@v4
        with:
          path: .tox
          key: ${{ runner.os }}-tox-${{ matrix.python-version }}-${{ hashFiles('**/tox.ini','**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-tox-${{ matrix.python-version }}-
            ${{ runner.os }}-tox-

      - name: Show Python
        run: |
          python --version
          which python

      - name: Install tox
        run: pip install --upgrade pip && pip install tox

      - name: Run pytest
        # Run pytest env only
        run: tox -e pytest

  client-tests:
    name: pulsar-relay-client unit tests
    needs: check
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # The client claims to support the full python range; verify it.
        python-version: [ '3.10', '3.11', '3.12', '3.13', '3.14' ]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-client-${{ matrix.python-version }}-${{ hashFiles('client/pyproject.toml','tox.ini') }}
          restore-keys: |
            ${{ runner.os }}-pip-client-${{ matrix.python-version }}-
            ${{ runner.os }}-pip-

      - name: Install tox
        run: pip install --upgrade pip && pip install tox

      - name: Run client unit suite
        run: tox -e client-tests

  e2e:
    name: OIDC end-to-end (Keycloak)
    needs: check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-3.12-${{ hashFiles('**/requirements.txt','**/pyproject.toml','**/tox.ini') }}
          restore-keys: |
            ${{ runner.os }}-pip-3.12-
            ${{ runner.os }}-pip-

      - name: Cache tox envs
        uses: actions/cache@v4
        with:
          path: .tox
          key: ${{ runner.os }}-tox-3.12-e2e-${{ hashFiles('**/tox.ini','**/requirements.txt','**/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-tox-3.12-e2e-
            ${{ runner.os }}-tox-3.12-

      - name: Docker pre-flight
        run: |
          docker version
          docker compose version
          docker info

      - name: Pre-pull Keycloak image
        run: docker pull quay.io/keycloak/keycloak:26.0

      - name: Install tox
        run: pip install --upgrade pip && pip install tox

      - name: Run OIDC e2e tests
        run: tox -e e2e

      - name: Dump Keycloak logs on failure
        if: failure()
        run: |
          docker compose -f tests/e2e/docker-compose.yml logs || true
          docker ps -a || true
