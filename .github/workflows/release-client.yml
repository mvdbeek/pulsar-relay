name: Release pulsar-relay-client

# Triggered by tags shaped `client-v1.2.3` so it doesn't collide with the
# server release flow (which keys off `v*.*.*`).
on:
  push:
    tags:
      - 'client-v*.*.*'

permissions:
  contents: write
  id-token: write

jobs:
  pypi-publish:
    name: Publish pulsar-relay-client to PyPI
    runs-on: ubuntu-latest
    environment:
      name: pypi-client
      url: https://pypi.org/p/pulsar-relay-client
    permissions:
      id-token: write  # mandatory for PyPI trusted publishing
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Verify version matches tag
        run: |
          # Tag form: client-v1.2.3 → 1.2.3
          TAG_VERSION="${GITHUB_REF#refs/tags/client-v}"
          PACKAGE_VERSION=$(grep '^version = ' client/pyproject.toml | cut -d'"' -f2)
          echo "Tag version: $TAG_VERSION"
          echo "Package version: $PACKAGE_VERSION"
          if [ "$TAG_VERSION" != "$PACKAGE_VERSION" ]; then
            echo "Error: Tag version ($TAG_VERSION) does not match client/pyproject.toml version ($PACKAGE_VERSION)"
            exit 1
          fi

      - name: Build client package
        working-directory: ./client
        run: python -m build

      - name: Check package
        working-directory: ./client
        run: twine check dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: ./client/dist

  github-release:
    name: Create GitHub Release (client)
    needs: pypi-publish
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: extract_version
        run: |
          VERSION="${GITHUB_REF#refs/tags/client-v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Extract release notes from CHANGELOG.md
        # Pull the matching ``## [VERSION]`` block verbatim from the
        # shared CHANGELOG.md at repo root. The server and client are
        # versioned in lockstep, so the same block describes both;
        # only the ``### Client (...)`` subsection within it is
        # specific to this distribution. We publish the whole block
        # so consumers see what shipped in the corresponding server
        # release.
        run: |
          VERSION="${{ steps.extract_version.outputs.version }}"
          awk -v ver="$VERSION" '
            /^## \[/ {
              if ($0 ~ "^## \\[" ver "\\]") { capture=1; next }
              else if (capture) { exit }
            }
            capture { print }
          ' CHANGELOG.md > release_body.txt
          if [ ! -s release_body.txt ]; then
            echo "::error::No CHANGELOG.md section found for version ${VERSION}"
            exit 1
          fi
          echo "Release notes for ${VERSION}:"
          cat release_body.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: pulsar-relay-client ${{ steps.extract_version.outputs.version }}
          body_path: release_body.txt
          draft: false
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') || contains(github.ref, 'rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
